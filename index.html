<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أهلاً شهد ياسر ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff0f6;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* فقاعة الكلام السوداء */
        .speech-bubble {
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #000;
            color: #fff;
            padding: 12px 24px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .speech-bubble.show {
            transform: translateX(-50%) scale(1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px;
            border-style: solid;
            border-color: #000 transparent transparent transparent;
        }

        /* حركة الزر */
        #no-btn {
            transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 50;
        }

        .avatar-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .heart-bg {
            position: absolute;
            color: #f48fb1;
            opacity: 0.2;
            pointer-events: none;
            animation: move-up 10s linear infinite;
        }

        @keyframes move-up {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Audio Elements -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_2d74a00408.mp3" type="audio/mpeg">
    </audio>
    <audio id="flee-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="success-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Toggle -->
    <div id="music-toggle" class="music-control" title="تشغيل/إيقاف الموسيقى">
        <span id="music-icon" class="text-2xl">🎵</span>
    </div>

    <div id="hearts-container" class="absolute inset-0 pointer-events-none"></div>

    <div id="main-content" class="relative z-10 w-full max-w-md px-6 flex flex-col items-center text-center">
        
        <div id="ask-screen">
            <p class="text-pink-500 font-bold mb-2 opacity-80 tracking-widest text-sm">أهلاً شهد ياسر ✨</p>
            
            <!-- Avatar Area -->
            <div class="relative avatar-float mt-8 mb-10">
                <div id="bubble" class="speech-bubble">أنتِ أكيد بتهزري؟ 🤔</div>
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpobXp5ZWF2ZHh0Zjh2Z3p5Z3Z5Z3Z5Z3Z5Z3Z5Z3Z5Z3Z5Z3ZpbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" 
                     class="w-40 h-40 object-contain drop-shadow-lg" alt="Cute Avatar">
            </div>

            <h1 class="text-3xl font-black text-pink-900 mb-14 leading-tight">
                شهد.. هل تقبلين أن <br> تكوني صديقة لي؟
            </h1>

            <div class="flex items-center justify-center gap-6 h-32 relative w-full">
                <button id="yes-btn" class="bg-[#4caf50] text-white font-black py-4 px-12 rounded-2xl shadow-xl active:scale-95 transition-all z-20 hover:bg-[#43a047]">
                    نعم
                </button>

                <button id="no-btn" class="bg-[#f44336] text-white font-black py-4 px-12 rounded-2xl shadow-xl z-30 hover:bg-[#e53935]">
                    لا
                </button>
            </div>
        </div>

        <!-- Success Screen -->
        <div id="success-screen" class="hidden flex flex-col items-center">
            <div class="bg-white/50 backdrop-blur-xl p-10 rounded-[50px] shadow-2xl border-4 border-pink-300">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOWpobXp5ZWF2ZHh0Zjh2Z3p5Z3Z5Z3Z5Z3Z5Z3Z5Z3Z5Z3ZpbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/26FLdmIp6wJr91JAI/giphy.gif" 
                     class="w-60 h-60 mb-8 mx-auto" alt="Happy">
                <h2 class="text-4xl font-black text-pink-700 mb-4 leading-snug">كنت عارف يا شهد! 💖</h2>
                <p class="text-xl font-bold text-gray-700">أحلى صديقة والله 🌸</p>
                <button onclick="location.reload()" class="mt-10 text-pink-400 underline text-sm opacity-50 hover:opacity-100">إعادة البداية</button>
            </div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const bubble = document.getElementById('bubble');
        const askScreen = document.getElementById('ask-screen');
        const successScreen = document.getElementById('success-screen');
        const bgMusic = document.getElementById('bg-music');
        const fleeSound = document.getElementById('flee-sound');
        const successSound = document.getElementById('success-sound');
        const musicToggle = document.getElementById('music-toggle');
        const musicIcon = document.getElementById('music-icon');
        
        let noCount = 0;
        let yesScale = 1;
        let musicStarted = false;

        const phrases = [
            "",
            "أنتِ أكيد بتهزري؟ 🤔",
            "طب فكري تاني طيب! 🙄",
            "ليه كده يا شهد؟ 😢",
            "خلاص دي آخر فرصة! ⚠️",
            "يا بنتي بطلي دلع بقى 😂",
            "شهد.. قلبي هيقف! 💔",
            "هعيط والله 😭",
            "يا بنتي دوسي نعم وخلاص 🙄"
        ];

        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().catch(() => {});
                musicStarted = true;
                musicIcon.innerText = "⏸️";
            }
        }

        musicToggle.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicIcon.innerText = "⏸️";
            } else {
                bgMusic.pause();
                musicIcon.innerText = "▶️";
            }
        });

        function flee() {
            if (noCount < 3) return;
            
            startMusic();
            fleeSound.currentTime = 0;
            fleeSound.play();

            const btnRect = noBtn.getBoundingClientRect();
            const maxX = window.innerWidth - btnRect.width - 40;
            const maxY = window.innerHeight - btnRect.height - 40;

            const randomX = Math.max(20, Math.random() * maxX);
            const randomY = Math.max(20, Math.random() * maxY);

            const containerRect = noBtn.parentElement.getBoundingClientRect();
            const targetX = randomX - containerRect.left - (containerRect.width / 2) + (btnRect.width / 2);
            const targetY = randomY - containerRect.top - (containerRect.height / 2) + (btnRect.height / 2);

            noBtn.style.transform = `translate(${targetX}px, ${targetY}px)`;
        }

        noBtn.addEventListener('mouseover', flee);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleNo();
        });

        function handleNo() {
            startMusic();
            noCount++;
            
            if (noCount > 0) {
                bubble.innerText = phrases[Math.min(noCount, phrases.length - 1)];
                bubble.classList.add('show');
            }

            yesScale += 0.3;
            yesBtn.style.transform = `scale(${yesScale})`;

            if (noCount >= 3) {
                flee();
            }
        }

        noBtn.addEventListener('click', handleNo);

        yesBtn.addEventListener('click', () => {
            startMusic();
            successSound.play();
            askScreen.style.display = 'none';
            successScreen.classList.remove('hidden');
            
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff69b4', '#ff1493', '#ffffff', '#ffd700']
            });
        });

        // Background Hearts
        function createHearts() {
            const container = document.getElementById('hearts-container');
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }
        createHearts();

        // التفاعل الأول لتشغيل الصوت (قيود المتصفح)
        document.body.addEventListener('click', () => {
            if (!musicStarted) startMusic();
        }, { once: true });
    </script>
</body>
</html>
